substitutions:
  _REGION: us-central1
  _SERVICE_NAME: user-management-api
  _IMAGE_NAME: user-management-api
  _APP_ENV: prod
  _LOG_LEVEL: INFO

steps:
  - name: python:3.13-slim
    id: Run tests
    entrypoint: bash
    args:
      - -c
      - |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pytest --cov=app

  - name: gcr.io/cloud-builders/docker
    id: Build Docker image
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    id: Push Docker image
    args:
      - push
      - gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy to Cloud Run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - APP_ENV=${_APP_ENV},LOG_LEVEL=${_LOG_LEVEL}

images:
  - gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$SHORT_SHA