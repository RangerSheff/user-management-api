name: CI - Quality and Security

on:
  pull_request:
    branches:
      - develop
      - quality
      - main
  push:
    branches:
      - develop
      - quality
      - main

jobs:
  quality-security-tests:
    name: Quality, Security and Tests
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      LOG_LEVEL: INFO
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: test_db

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff lint
        run: |
          ruff check .

      - name: Run Bandit security scan
        run: |
          bandit -r app

      - name: Run dependency vulnerability scan
        run: |
          pip-audit

      - name: Run tests with coverage
        run: |
          pytest --cov=app
