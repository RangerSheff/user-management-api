services:
  db:
    image: postgres:16
    container_name: user_management_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: user_management_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_management_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: user_management_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:admin123@db:5432/user_management_db
    ports:
      - "8000:8000"

volumes:
  postgres_data: